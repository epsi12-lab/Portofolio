<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci | Bruce TUMPA MADILA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">Bruce TM.</a>
                <div class="nav-extra">
                    <div class="language-switcher">
                        <button class="lang-btn active" onclick="changeLanguage('fr')">FR</button>
                        <span>|</span>
                        <button class="lang-btn" onclick="changeLanguage('en')">EN</button>
                    </div>
                    <div class="theme-switch-wrapper">
                        <label class="theme-switch" for="checkbox">
                            <input type="checkbox" id="checkbox" />
                            <div class="slider round">
                                <i class="fas fa-moon"></i>
                                <i class="fas fa-sun"></i>
                            </div>
                        </label>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <section class="hero" id="thanks" style="min-height: 70vh; display: flex; align-items: center; justify-content: center;">
        <div class="container" style="text-align: center;">
            <div style="font-size: 5rem; margin-bottom: 30px;">✅</div>
            <h1 data-i18n="thanks_title">Merci pour votre message !</h1>
            <p style="font-size: 1.2rem; margin: 20px 0; max-width: 600px; margin-left: auto; margin-right: auto;" data-i18n="thanks_message">Votre message a bien été envoyé. Je vous répondrai dans les plus brefs délais.</p>
            <a href="index.html" class="btn" data-i18n="thanks_back">Retour à l'accueil</a>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2026 Bruce TUMPA MADILA. <span data-i18n="footer_rights">Tous droits réservés.</span></p>
        </div>
    </footer>

    <script src="js/translations.js"></script>
    <script>
        // Dark Mode
        const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
        const currentTheme = localStorage.getItem('theme');

        if (currentTheme) {
            document.documentElement.setAttribute('data-theme', currentTheme);
            if (currentTheme === 'dark') {
                toggleSwitch.checked = true;
            }
        }

        function switchTheme(e) {
            if (e.target.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
                localStorage.setItem('theme', 'light');
            }
        }

        toggleSwitch.addEventListener('change', switchTheme, false);

        // Langue active au chargement
        document.addEventListener('DOMContentLoaded', () => {
            const savedLang = localStorage.getItem('language') || 'fr';
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === savedLang);
            });
        });
    </script>
</body>
</html>
